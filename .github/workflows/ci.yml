name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  MIX_ENV: test

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - elixir: "1.19"
            otp: "27"
          - elixir: "1.20"
            otp: "29"

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: mix-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('mix.lock') }}
          restore-keys: mix-${{ matrix.otp }}-${{ matrix.elixir }}-

      - uses: actions/cache@v4
        with:
          path: _build/dev/dialyxir*.plt
          key: plt-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('mix.lock') }}
          restore-keys: plt-${{ matrix.otp }}-${{ matrix.elixir }}-

      - run: mix deps.get
      # The HTML report tests need built frontend assets; volt is a dev-only
      # dependency, so the asset build runs in the dev environment. The
      # committed bundles under priv/static must match the frontend sources —
      # rebuild and fail if a PR forgot to commit updated bundles.
      - run: npm ci --prefix assets
      - run: MIX_ENV=dev mix assets.build
      - run: git diff --exit-code priv/static
      - run: mix ci
        if: matrix.elixir == '1.20'
      - run: mix compile --warnings-as-errors && mix test
        if: matrix.elixir != '1.20'
